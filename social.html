<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social & Videos | firethesuper</title>
    <link rel="icon" type="image/png" href="logoscheda.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-white: #ffffff;
            --card-light: #f9f9f9;
            --text-dark: #191919;
            --text-muted: #666666;
            --primary-red: #FF2400;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-white);
            color: var(--text-dark);
            font-family: 'Plus Jakarta Sans', sans-serif;
            padding-top: 130px;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 36, 0, 0.1);
            z-index: 1000;
        }

        .logo {
            font-family: 'Fredoka', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-red);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .nav-links a.active {
            color: var(--primary-red);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
            color: var(--text-dark);
        }

        .social-buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 90px;
        }

        .social-card {
            background-color: var(--card-light);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 800;
            font-size: 18px;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(255, 36, 0, 0.05);
        }

        .social-card i {
            font-size: 30px;
        }

        .social-card:hover {
            transform: translateY(-4px);
            background-color: #fff5f4;
            box-shadow: 0 10px 20px rgba(255, 36, 0, 0.05);
        }

        .youtube-c i { color: #FF0000; }
        .discord-c i { color: #5865F2; }
        .github-c i { color: #191919; }
        .linkedin-c i { color: #0077B5; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .video-card {
            background-color: #000000;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }

        .video-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            opacity: 0.85;
            filter: brightness(0.85);
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 55px;
            height: 55px;
            background-color: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 16px;
            opacity: 0.8;
            transition: all 0.3s ease;
            z-index: 2;
        }

        .date-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ffffff;
            color: #000000;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .video-card:hover .video-thumb {
            transform: scale(1.05);
            opacity: 1;
            filter: brightness(1);
        }

        .video-card:hover .play-button {
            transform: translate(-50%, -50%) scale(1.08);
            background-color: var(--primary-red);
            color: #ffffff;
            opacity: 1;
        }

        .view-all-container {
            display: flex;
            justify-content: center;
            margin: 60px 0;
        }

        .view-all-btn {
            background-color: var(--text-dark);
            color: #ffffff;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.3s;
        }

        .view-all-btn:hover {
            background-color: var(--primary-red);
        }

        @media (max-width: 992px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">firethesuper</a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="lavori.html">Works</a></li>
            <li><a href="social.html">Links</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="section-title">Links</h2>
        <div class="social-buttons-grid">
            <a href="https://youtube.com/@firethesuper" target="_blank" class="social-card youtube-c">
                <i class="fa-brands fa-youtube"></i> YouTube
            </a>
            <a href="https://dsc.gg/firethesuper" target="_blank" class="social-card discord-c">
                <i class="fa-brands fa-discord"></i> Discord
            </a>
            <a href="https://twitch.tv/firethesuper" target="_blank" class="social-card Twitch-c">
                <i class="fa-brands fa-twitch"></i> Twitch
            </a>
            <a href="https://instagram.com/firethesuper" target="_blank" class="social-card Instagram-c">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
        </div>

        <h2 class="section-title">YouTube Videos</h2>
        <div class="video-grid">
            <div class="video-card" onclick="window.open('https://youtu.be/4ex3pm2DDuI?si=62NRHve4E4R0VPEn', '_blank')">
                <div class="date-badge">LA MIA STORIA.</div>
                <div class="play-button"><i class="fa-solid fa-play"></i></div>
                <img src="lamiastoria.png" class="video-thumb" alt="La Mia Storia">
            </div>
            <div class="video-card" onclick="window.open('https://youtu.be/ZtoVGiX_T6k?si=73giewiU7fXx_dJD', '_blank')">
                <div class="date-badge">IL MIO PRIMO VIDEO.</div>
                <div class="play-button"><i class="fa-solid fa-play"></i></div>
                <img src="ilmioprimovideo.png" class="video-thumb" alt="Il Mio Primo Video">
            </div>
        </div>

        <div class="view-all-container">
            <a href="https://youtube.com/@firethesuper" target="_blank" class="view-all-btn">View All Videos</a>
        </div>
    </div>

</body>
</html>
